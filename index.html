<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu MVP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    .container { padding: 12px; padding-bottom: 80px; }
    .card { background:#fff; border-radius:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); overflow:hidden;} 
    .image { width:100%; height:160px; background:#e0e0e0; display:flex; align-items:center; justify-content:center; color:#999; }
    .content { padding:12px; }
    .title { font-weight:700; font-size:16px; margin-bottom:4px; }
    .desc { font-size:13px; color:#666; margin-bottom:8px; }
    .row { display:flex; justify-content:space-between; align-items:center; }
    .controls button { width:32px; height:32px; border:none; border-radius:8px; background:#eee; }
    .cart { position:fixed; bottom:0; left:0; right:0; background:#fff; padding:10px; box-shadow:0 -2px 8px rgba(0,0,0,0.1);} 
    .btn { width:100%; padding:12px; border:none; border-radius:12px; background:#2ea6ff; color:#fff; font-weight:bold; }
  </style>
</head>
<body>
  <div class="container" id="menu"></div>
  <div class="cart">
    <div id="total">Итого: 0 ₽</div>
    <button class="btn" onclick="checkout()">Оформить</button>
  </div>

<script>
// 👉 ВАЖНО: теперь данные грузятся из data.json
let data = [];
let cart = {};

async function loadData(){
  try {
    const res = await fetch('data.json');
    data = await res.json();
    render();
  } catch(e) {
    console.error('Ошибка загрузки data.json', e);
  }
}

function render(){
  const menu = document.getElementById('menu');
  menu.innerHTML = '';

  data.forEach(item => {
    const count = cart[item.id] || 0;

    menu.innerHTML += `
      <div class="card">
        <div class="image">
          ${item.image ? `<img src="${item.image}" style="width:100%; height:100%; object-fit:cover;"/>` : 'Нет фото'}
        </div>
        <div class="content">
          <div class="title">${item.name}</div>
          <div class="desc">${item.composition || ''}</div>
          <div class="row">
            <div>${item.price} ₽</div>
            <div class="controls">
              <button onclick="dec(${item.id})">-</button>
              ${count}
              <button onclick="inc(${item.id})">+</button>
            </div>
          </div>
        </div>
      </div>
    `;
  });

  updateTotal();
}

function inc(id){ cart[id] = (cart[id]||0)+1; render(); }
function dec(id){ if(cart[id]) cart[id]--; render(); }

function updateTotal(){
  let total = 0;
  data.forEach(i => total += (cart[i.id]||0)*i.price);
  document.getElementById('total').innerText = 'Итого: ' + total + ' ₽';
}

function checkout(){
  let text = 'Заказ:\n';
  data.forEach(i => {
    if(cart[i.id]) text += `${i.name} x${cart[i.id]}\n`;
  });

  if(window.Telegram.WebApp){
    Telegram.WebApp.sendData(text);
  } else {
    alert(text);
  }
}

loadData();
</script>
</body>
</html>
